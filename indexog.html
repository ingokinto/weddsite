<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einladung zur Hochzeit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap"
        rel="stylesheet">

    <style>
        /* Grundlegendes Layout & Samt-Hintergrund */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            /* Verhindert Scrollen während der Animation */
        }

        .scene-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ZUSTAND 1: DER UMSCHLAG --- */
        .envelope-wrapper {
            position: absolute;
            width: 125%;
            max-width: 600px;
            text-align: center;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            z-index: 10;
        }

        .envelope-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
            transition: opacity 0.4s ease-in-out;
            /* Ermöglicht das Überblenden */
        }


        /* Dein angepasster Basis-Zustand */
        .seal-img {
            position: absolute;
            width: 20%;
            top: 45%;
            left: 50%;
            /* Deine neue Position */
            transform: translate(-50%, 35%);
            cursor: pointer;
            filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.6));
            transition: transform 0.3s ease, filter 0.3s ease, opacity 0.3s ease;
        }

        /* Der korrigierte Hover-Zustand */
        .seal-img:hover {
            /* WICHTIG: Die -50% und 35% müssen hier wieder rein! */
            transform: translate(-50%, 35%) scale(1.08);
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.8));
        }

        /* Klassen für die Ausblend-Animation */
        .envelope-wrapper.hidden {
            opacity: 0;
            transform: scale(1.2) translateY(50px);
            pointer-events: none;
        }

        /* --- ZUSTAND 2: 3D-AUFKLAPPEN (WIE EIN BRIEF) --- */
        .scroll-wrapper {
            position: absolute;
            width: 100%;
            max-width: 700px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;

            /* NEUE ANIMATION: 3D-Aufklappen */
            opacity: 0;
            transform-style: preserve-3d;
            /* Startet nach hinten geklappt und leicht gestaucht */
            transform: perspective(1200px) rotateX(-70deg) scaleY(0.5) translateY(-50px);
            transform-origin: top center;
            /* Das Papier "hängt" quasi oben und klappt nach unten auf */

            /* Ein dynamisches Timing: Erst schnell, dann federt es weich ein */
            transition: opacity 0.5s ease-in-out 0.2s,
                transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.15) 0.2s;
        }

        .scroll-wrapper.visible {
            opacity: 1;
            /* Endzustand: Liegt flach und ist voll sichtbar */
            transform: perspective(1200px) rotateX(0deg) scaleY(1) translateY(0);
            pointer-events: auto;
        }

        .scroll-img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7));
        }

        /* Der Text über der Schriftrolle */
        .scroll-content {
            position: absolute;
            top: 15%;
            /* Hier deine eigenen Werte beibehalten, falls du sie geändert hast! */
            bottom: 15%;
            left: 15%;
            right: 15%;
            text-align: center;
            color: #2c1e16;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;

            /* NEU: Text ist am Anfang unsichtbar und leicht nach unten verschoben */
            opacity: 0;
            transform: translateY(20px);

            /* Der Text fadet erst nach 1.2 Sekunden ein (wenn die Rolle fast offen ist) */
            transition: opacity 0.8s ease-in-out 1.2s, transform 0.8s ease-out 1.2s;
        }

        /* Wenn die Rolle offen ist (.visible), wird der Text sichtbar */
        .scroll-wrapper.visible .scroll-content {
            opacity: 1;
            transform: translateY(0);
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            color: #8b0000;
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        p {

            font-size: clamp(0.9rem, 2vw, 1.2rem);
            line-height: 1.6;
            margin: 10px 0;
        }

        .divider {
            font-size: 24px;
            color: #d4af37;
            margin: 20px 0;
        }

        /* RSVP Formular Design */
        .rsvp-form {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
        }

        .rsvp-form input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #d4af37;
            background: transparent;
            font-family: 'Cinzel', serif;
            color: #2c1e16;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .rsvp-form input::placeholder {
            color: rgba(44, 30, 22, 0.6);
        }

        .radio-group {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .rad+io-group label {
            cursor: pointer;
        }

        button {
            background-color: #8b0000;
            color: white;
            border: 2px solid #660000;
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #660000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>

<body>

    <div class="scene-container">

        <div class="envelope-wrapper" id="envelopeWrapper">
            <img src="envelope.png" alt="Briefumschlag" class="envelope-img" id="envelopeClosed">
            <img src="envelopeopen.png" alt="Briefumschlag offen" class="envelope-img" id="envelopeOpen"
                style="opacity: 0; position: absolute; top: 0; left: 0;">

            <img src="siegel.png" alt="Wachssiegel" class="seal-img" id="sealBtn" onclick="openInvitation()">
        </div>
        <div class="scroll-wrapper" id="scrollWrapper">
            <img src="scroll.jpg" alt="Schriftrolle" class="scroll-img">

            <div class="scroll-content">
                <h1>Unsere Hochzeit</h1>
                <p>Liebe Familie, liebe Freunde,</p>
                <p>wir laden euch herzlich ein, unseren besonderen Tag mit uns zu feiern.</p>
                <p>
                    <strong>Wann:</strong> Samstag, 06. Juni 2026<br>
                    <strong>Wo:</strong> Wiesentalstraße 26, 72574 Bad Urach<br>
                    <strong>Beginn:</strong> 14:00 Uhr
                </p>

                <div class="divider">❦</div>

                <div class="rsvp-form">
                    <form onsubmit="submitForm(event)">
                        <input type="text" placeholder="Name(n) der Gäste" required>

                        <div class="radio-group">
                            <label><input type="radio" name="attendance" value="yes" required> 💍 Ja, wir
                                kommen!</label>
                            <label><input type="radio" name="attendance" value="no"> Leider nicht</label>
                        </div>

                        <input type="text" placeholder="Bemerkungen oder Allergien?">

                        <button type="submit">Antwort senden</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script>
        function openInvitation() {
            const seal = document.getElementById('sealBtn');
            const closedEnv = document.getElementById('envelopeClosed');
            const openEnv = document.getElementById('envelopeOpen');
            const wrapper = document.getElementById('envelopeWrapper');
            const scroll = document.getElementById('scrollWrapper');

            // 1. Siegel verschwinden lassen
            seal.style.opacity = '0';
            seal.style.pointerEvents = 'none';

            // 2. Bilder tauschen (Cross-Fade)
            closedEnv.style.opacity = '0';
            openEnv.style.opacity = '1';

            // 3. Kurze Verzögerung, damit man den offenen Umschlag sieht, dann Übergang zur Rolle
            setTimeout(() => {
                wrapper.classList.add('hidden');
                scroll.classList.add('visible');
            }, 600); // 600ms zeigt den offenen Umschlag kurz an
        }
        function submitForm(event) {
            event.preventDefault();
            // Hier kommt später der Formspree-Link rein
            alert("Vielen Dank! Die Antwort wurde virtuell versendet.");
        }
    </script>
</body>

</html>
